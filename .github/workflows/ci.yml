name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared types
        run: pnpm --filter @poscoffe/types build

      - name: Generate Prisma client
        run: pnpm --filter @poscoffe/server prisma:generate

      - name: Build server
        run: pnpm --filter @poscoffe/server build

      - name: Test server
        run: pnpm --filter @poscoffe/server test

      - name: Typecheck & build POS
        run: pnpm --filter @poscoffe/pos build
