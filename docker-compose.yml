services:
  postgres:
    image: postgres:16-alpine
    container_name: poscoffe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: poscoffe
      POSTGRES_PASSWORD: poscoffe
      POSTGRES_DB: poscoffe
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poscoffe"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: poscoffe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
