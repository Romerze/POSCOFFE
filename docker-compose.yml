services:
  postgres:
    image: postgres:16-alpine
    container_name: poscoffe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: poscoffe
      POSTGRES_PASSWORD: poscoffe
      POSTGRES_DB: poscoffe
    ports:
      # Host 5434 para no chocar con un PostgreSQL instalado localmente (5432).
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poscoffe"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: poscoffe-redis
    restart: unless-stopped
    ports:
      # Host 6380 para no chocar con un Redis local (6379).
      - "6380:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
